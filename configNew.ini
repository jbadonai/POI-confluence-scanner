# testnet = false   REAL MONEY on mainnet (default)
# testnet = true    safe sandbox for testing
testnet     = false

#  Auto-trading master switch 
# true  = signals are executed automatically on Bybit
# false = signal alerts only (Telegram), no orders placed
auto_trade  = false

#  Leverage 
# use_max_leverage = true    query Bybit for max allowed leverage per pair
# use_max_leverage = false   always use fixed_leverage below
use_max_leverage = false
fixed_leverage   = 10

#  Position sizing method 
# FIXED_RISK    risk a fixed USD amount per trade (recommended, default)
#                position notional = risk_usd / sl_pct
# PCT_BALANCE   risk a % of your available wallet balance per trade
#                position notional = balance * pct_balance / 100 / sl_pct
sizing_mode  = FIXED_RISK

# Used when sizing_mode = FIXED_RISK
risk_usd     = 1.0

# Used when sizing_mode = PCT_BALANCE
pct_balance  = 2.0

#  Taker fee (used to calculate true risk when sizing) 
# Bybit VIP0 taker fee is 0.055% per side  0.00055
taker_fee    = 0.00055

#  Concurrency guard 
# Maximum number of open Bybit positions at once (across all pairs).
# New signals are skipped when this limit is reached.
max_concurrent_trades = 5

# -- Failure notifications --
# true  = Telegram message when a trade fails (balance too low, bad symbol, etc.)
# false = log only, no Telegram message for failures
notify_failures     = true

#  Execution
# order_type = MARKET   fills immediately at best available price (default)
# order_type = LIMIT    posts at entry price (may not fill in fast markets)
order_type          = MARKET

# Limit order only: how far from current price we allow our limit to be (ratio)
# 0.001 = 0.1% slippage tolerance
slippage_tolerance  = 0.001

#  SL / TP trigger price
# LAST_PRICE   triggers on last traded price (default, matches chart)
# MARK_PRICE   triggers on index-derived price (safer vs wicks on low-liq pairs)
sl_trigger  = LAST_PRICE
tp_trigger  = LAST_PRICE

