#
[GENERAL]
# Zone mitigation mode: CLOSE_BEYOND | WICK_BEYOND | BOTH_M
mitigation = CLOSE_BEYOND

#
[ORDER_BLOCK]
enabled      = true
swing_len    = 10
max_atr_mult = 3.5
max_blocks   = 5

#
[ODD_CANDLE]
enabled    = false
min_series = 2

#
[LIQUIDITY_SWING]
enabled   = true
pivot_len = 14
# WICK_EXTREMITY | FULL_RANGE
area      = WICK_EXTREMITY

#
[ZONE]
overlap_tol = 0.1

#
[REJECTION]
enabled      = true
ratio        = 1.5
min_body_atr = 0.05
# WICK_IN_CLOSE_OUT | ANY_TOUCH | CLOSE_INSIDE
zone_mode    = ANY_TOUCH

# Require confluence: only fire signals where enough zone types overlap
# true  = enforce min_confluence threshold below
# false = fire on any zone regardless of how many types confirmed it
require_confluence = true

# Minimum number of zone types that must overlap for a valid signal (only used when
# require_confluence = true). 3 POI methods are monitored: OB, Odd Candle, Liquidity Swing.
#   2 = at least 2 must overlap (e.g. OB+LS, OB+OC, OC+LS)  — default, recommended
#   3 = all 3 must overlap (OB+OC+LS only) — strictest, fewest signals, highest quality
# NOTE: automatically capped to the number of ENABLED zone types.
#   e.g. if Odd Candle is disabled (enabled=false above), only OB and LS are active,
#   so min_confluence=3 is treated as 2 — preventing permanent signal blockage.
min_confluence = 2

#
[TRADE]
# SL = candle wick extreme + ATR * sl_atr_mult
# Recommended: 1.0 to 2.0  (higher = wider stop, fewer stopped-out trades)
sl_atr_mult = 1.5

# ATR period used for SL calculation
sl_atr_len  = 14

# Take profit as a multiple of risk (1:tp_rr)
# Recommended: 1.5 to 3.0  (higher RR = fewer wins but larger when they hit)
tp_rr       = 1.5

# pip_size: price distance per pip (1.0 for crypto USDT pairs)
pip_size    = 1.0

#
[POSITION_SIZING]
# Legacy scanner-only sizing (used for Telegram alerts when auto_trade = false)
enabled   = true
risk      = 1.0
pip_value = 1.0
min_lot   = 0.001
lot_step  = 0.001

#
[SCANNER]
# interval_seconds is derived automatically from timeframe — no need to set manually:
#   1m=60  3m=180  5m=300  15m=900  30m=1800  1h=3600  4h=14400  1d=86400
# Your timeframe = 1m, so interval = 60s automatically.
max_concurrent_requests = 50
max_worker_threads      = 16
