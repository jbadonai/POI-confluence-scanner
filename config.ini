# -- Leverage -----------------------------------------------------------------
# use_max_leverage = true   -> query Bybit for max allowed leverage per pair
#                              (recommended — adapts to each pair automatically)
# use_max_leverage = false  -> always use the fixed_leverage value below
use_max_leverage = true

# Fixed leverage used when use_max_leverage = false
# Bybit allows 1x to 100x depending on the pair and your account tier
fixed_leverage   = 10

# -- Position sizing method ---------------------------------------------------
# FIXED_RISK   -> risk exactly risk_usd dollars per trade (recommended)
#                 position notional = risk_usd / sl_pct
#                 e.g. risk_usd=50, SL=0.5% away -> notional = $10,000
#
# PCT_BALANCE  -> risk a percentage of your wallet balance per trade
#                 position notional = (balance * pct_balance / 100) / sl_pct
#                 e.g. balance=$1000, pct=2%, SL=0.5% -> notional = $4,000
sizing_mode  = FIXED_RISK

# Dollar amount to risk per trade (used when sizing_mode = FIXED_RISK)
# This is your maximum loss if SL is hit (before fees)
risk_usd     = 1.0

# Percentage of balance to risk (used when sizing_mode = PCT_BALANCE)
# 2.0 = risk 2% of available wallet balance per trade
pct_balance  = 2.0

# Bybit taker fee per side (used in true-risk calculations for display)
# VIP0 standard rate = 0.00055 (0.055%)
# Check your actual rate at Bybit > Account > Fee Rate
taker_fee    = 0.00055

# -- Concurrency guard --------------------------------------------------------
# Maximum number of open Bybit positions allowed at the same time (all pairs)
# New signals are skipped when this limit is reached
# Recommended: 3-10 depending on your balance
max_concurrent_trades = 5

# -- Failure notifications ----------------------------------------------------
# true  = send Telegram alert when a trade fails (insufficient balance,
#         invalid symbol, leverage error, etc.)
# false = log failures to file only, no Telegram message for failures
notify_failures     = true

# -- Order execution ----------------------------------------------------------
# MARKET -> fills immediately at best available price (recommended for signals)
#           no price slippage concern, guaranteed fill
# LIMIT  -> posts a limit order at the signal entry price
#           may not fill if price moves away quickly
order_type          = MARKET

# Slippage tolerance for LIMIT orders only (ratio, not percentage)
# 0.001 = allow up to 0.1% deviation from signal price
# Only relevant when order_type = LIMIT
slippage_tolerance  = 0.001

# -- SL/TP trigger price type -------------------------------------------------
# LAST_PRICE  -> triggers on the last traded price (matches what you see on chart)
#                recommended for liquid pairs
# MARK_PRICE  -> triggers on the index-derived mark price (safer for low-liquidity
#                pairs — prevents wick-triggered stops from thin order books)
sl_trigger  = LAST_PRICE
tp_trigger  = LAST_PRICE

