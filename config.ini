# -- Auto-trading master switch -----------------------------------------------
# true  = signals executed automatically on Bybit
#         Max leverage fetched from Bybit per pair automatically
#         Order value = floor(max_leverage / 2) USDT — no manual setting needed
# false = signal alerts + Manual Trade GUI opens
#         Order value set manually in GUI (default: manual_order_value below)
auto_trade  = false

# -- Order value mode ---------------------------------------------------------
# Controls how the USDT notional (Bybit "Order Value") is determined.
# Applies to BOTH auto_trade=true and auto_trade=false (GUI mode).
#
# use_manual_order_value = true
#   -> use the fixed manual_order_value (USDT) below, regardless of leverage
#   -> same value used whether auto or manual mode
#
# use_manual_order_value = false  (default)
#   -> order_value = floor(max_leverage * order_value_multiplier)
#   -> adapts automatically per pair based on Bybit's max leverage
use_manual_order_value = true

# Fixed order value in USDT (used when use_manual_order_value = true)
# e.g. 10 means every trade uses exactly 10 USDT as order value
manual_order_value = 10

# Leverage multiplier (used when use_manual_order_value = false)
# order_value = floor(max_leverage * order_value_multiplier)
# Examples for a pair with max_leverage = 100x:
#   0.25 -> 25 USDT  (quarter of max leverage)
#   0.5  -> 50 USDT  (half of max leverage)   <- default, recommended
#   0.75 -> 75 USDT  (three-quarters)
#   1.0  -> 100 USDT (full max leverage)
#   1.5  -> 150 USDT (1.5x max leverage)
#   2.0  -> 200 USDT (double max leverage)
# Note: values > 1.0 exceed max leverage notional — use with caution
# Recommended: 0.5 (balanced) to 1.0 (aggressive)
order_value_multiplier = 0.5

# -- Concurrency guard --------------------------------------------------------
# Maximum number of open Bybit positions at the same time (all pairs combined)
# New signals are skipped when this limit is reached
# Recommended: 3-10 depending on your balance
max_concurrent_trades = 5

# -- Failure notifications ----------------------------------------------------
# true  = send Telegram alert when a trade fails (balance, symbol, leverage errors)
# false = log failures to file only, no Telegram message
notify_failures     = true

# -- Order execution ----------------------------------------------------------
# MARKET -> fills immediately at best available price (recommended)
#           guaranteed fill, no price slippage concern
# LIMIT  -> posts a limit order at the signal entry price
#           may not fill if price moves away quickly
order_type          = MARKET

# -- SL/TP trigger price type -------------------------------------------------
# LAST_PRICE  -> triggers on last traded price (matches what you see on chart)
#                recommended for liquid pairs
# MARK_PRICE  -> triggers on index-derived mark price (safer for low-liquidity
#                pairs — prevents wick-triggered stops from thin order books)
sl_trigger  = MARK_PRICE
tp_trigger  = MARK_PRICE

