# -----------------------------------------------------------------------------
[GENERAL]

# Zone mitigation mode — determines when a zone is considered "used up" and removed
# CLOSE_BEYOND -> zone removed when a candle CLOSES beyond the zone boundary
#                 (recommended — avoids removing zones on wick fakes)
# WICK_BEYOND  -> zone removed when price WICKS beyond the boundary (any touch)
#                 (more aggressive — removes zones faster)
# BOTH_M       -> zone marked as "hit" on first touch, then removed on close beyond
#                 (two-stage: tolerates one test of the zone before removal)
mitigation = CLOSE_BEYOND

# -----------------------------------------------------------------------------
[ORDER_BLOCK]

# Enable/disable Order Block zone detection
enabled      = true

# Swing length — number of bars used to identify swing highs/lows
# Higher = detects larger structural swings (fewer but more significant zones)
# Lower  = detects smaller swings (more zones, more noise)
# Recommended: 8-14
swing_len    = 10

# Maximum OB size as a multiple of ATR(10)
# Filters out unusually large OBs caused by news spikes or gaps
# e.g. 3.5 = OB must be smaller than 3.5x the 10-bar ATR
# Reduce to 2.0 for stricter filtering, increase to 5.0 to allow larger OBs
max_atr_mult = 3.5

# Maximum number of Order Block zones kept per direction (long/short separately)
# When exceeded, the oldest OB is removed first
# Recommended: 3-7
max_blocks   = 5

# -----------------------------------------------------------------------------
[ODD_CANDLE]

# Enable/disable Odd Candle zone detection
# An "odd candle" is a candle moving against the surrounding sequence
# e.g. a bearish candle in a bullish series -> demand zone below it
enabled    = true

# Minimum number of consecutive same-direction candles required on each side
# of the odd candle to confirm the pattern
# e.g. min_series=2 -> need at least 2 bull candles before the bear odd candle
# Higher = stricter, fewer but cleaner signals
# Recommended: 2-4
min_series = 2

# -----------------------------------------------------------------------------
[LIQUIDITY_SWING]

# Enable/disable Liquidity Swing zone detection
# Identifies pivot highs/lows where liquidity pools (stop clusters) exist
enabled   = true

# Pivot look-left and look-right period
# A pivot high requires pivot_len bars of lower highs on BOTH sides
# Higher = identifies more significant swing points (fewer but stronger zones)
# Lower  = more sensitive, identifies minor pivots too
# Recommended: 10-20
pivot_len = 14

# Zone extent — how the LS zone boundaries are drawn
# WICK_EXTREMITY -> zone top = pivot high wick, zone bottom = candle body top
#                   (tighter zone, price needs to enter the body area)
# FULL_RANGE     -> zone covers the full candle from wick to wick
#                   (wider zone, catches more price reactions)
area      = WICK_EXTREMITY

# -----------------------------------------------------------------------------
[ZONE]

# Overlap tolerance for zone merging (as a multiple of ATR14)
# When two same-direction zones overlap within this distance, they are merged
# into one combined zone with both source types (e.g. OB+LS)
# 0.1 = zones within 10% of ATR of each other are merged
# Higher = merges zones that are further apart (fewer total zones)
# Lower  = only merges zones that nearly perfectly overlap
overlap_tol = 0.1

# -----------------------------------------------------------------------------
[REJECTION]

# Enable/disable Rejection Candle signal detection
# A rejection candle has a significantly longer wick than its body
# indicating price was pushed away from a zone
enabled      = true

# Wick-to-body ratio required to qualify as a rejection candle
# ratio = lower_wick / body  (for bull rejection)
# ratio = upper_wick / body  (for bear rejection)
# 1.5 = wick must be at least 1.5x the body length
# Higher = requires stronger rejection (fewer but cleaner signals)
# Lower  = more sensitive (more signals, more noise)
# Recommended: 1.2-2.0
ratio        = 1.5

# Minimum candle body size as a multiple of ATR14
# Filters out doji/spinning-top candles with near-zero body
# 0.05 = body must be at least 5% of ATR14
# Increase to 0.1-0.2 to require more decisive candles
min_body_atr = 0.05

# Zone interaction mode — how the rejection candle must relate to the zone
# WICK_IN_CLOSE_OUT -> wick enters the zone AND close exits back outside
#                      (recommended — confirms rejection, price rejected at zone)
# ANY_TOUCH         -> any part of the candle overlaps the zone
#                      (most sensitive — fires on any contact with zone)
# CLOSE_INSIDE      -> candle closes inside the zone
#                      (rarest — price penetrates but doesn't exit yet)
zone_mode    = WICK_IN_CLOSE_OUT

# Require confluence — enforce that multiple zone types confirm the signal
# true  = only trade zones confirmed by min_confluence or more POI types
# false = trade any zone regardless of how many types confirmed it
require_confluence = true

# Minimum number of zone types that must overlap for a valid signal
# Only applies when require_confluence = true
# 3 POI types monitored: Order Block (OB), Odd Candle (OC), Liquidity Swing (LS)
#   1 = any single zone type (same as require_confluence = false)
#   2 = at least 2 types must overlap: OB+LS, OB+OC, or OC+LS  (recommended)
#   3 = all 3 types must overlap: OB+OC+LS only  (strictest, fewest signals)
# NOTE: auto-capped to number of ENABLED zone types
#   e.g. if ODD_CANDLE disabled, only OB and LS active -> min=3 treated as 2
min_confluence = 3

# -----------------------------------------------------------------------------
[HTF_FILTER]

# -- Master switch ------------------------------------------------------------
# true  = HTF trend filter active
# false = all signals pass unchanged (no HTF filtering)
enabled          = true

# -- Filter mode (when enabled = true) ----------------------------------------
# true  = STRICT: counter-trend signals are SKIPPED entirely
#         Telegram failure notification sent if notify_failures = true
# false = LENIENT: counter-trend signals allowed but TP reduced to
#         counter_trend_rr (treats signal as small retracement, not reversal)
strict           = false

# -- HTF timeframe ------------------------------------------------------------
# Must be HIGHER than your trading timeframe in [BINANCE]
#   Trading 5m  -> 1h or 4h      Trading 1h  -> 4h or 1d
#   Trading 15m -> 4h or 1d      Trading 4h  -> 1d or 1w
# Options: 1m  3m  5m  15m  30m  1h  2h  4h  1d  1w
timeframe        = 1h

# -- Ichimoku Cloud parameters ------------------------------------------------
# These match the Pine Script "ADVANCED TREND DETECTOR" exactly.
# Standard Ichimoku defaults — only change if you know what you are doing.
#
# tenkan_period  (Conversion Line): avg of highest+lowest over N bars
tenkan_period    = 9
#
# kijun_period   (Base Line): avg of highest+lowest over N bars
kijun_period     = 26
#
# senkou_b_period (Leading Span B): avg of highest+lowest over N bars
senkou_b_period  = 52
#
# displacement: how many bars the cloud is shifted forward in Pine Script
displacement     = 26

# -- Ranging market filter ----------------------------------------------------
# true  = skip ALL signals when HTF is Ranging (price inside the cloud)
#         Recommended — ranging markets produce the most false signals
# false = allow signals in ranging market (treated as neutral, no filtering)
skip_ranging     = true

# -- Counter-trend TP RR (LENIENT mode only) ----------------------------------
# TP set to this RR multiple for counter-trend trades (strict = false)
# 0.3 = very tight TP — take quick profit before trend resumes
# 0.5 = standard counter-trend target (recommended)
counter_trend_rr = 0.3

# -----------------------------------------------------------------------------
[TRADE]

# SL placement: candle wick extreme + (ATR * sl_atr_mult)
# The SL is always placed beyond the rejection candle's wick for structure,
# with an additional ATR buffer for breathing room
# 0.5 = tight stop, closer to structure (higher risk of getting stopped out)
# 1.0 = standard buffer
# 1.5 = wider stop, more breathing room (recommended)
# 2.0 = very wide stop, fewer stops hit but larger loss when hit
sl_atr_mult = 1.5

# ATR period used for SL calculation
# 14 is the standard (matches most charting platforms)
sl_atr_len  = 14

# Take profit as a multiple of risk (Risk:Reward ratio)
# TP = entry + (SL distance * tp_rr)  for longs
# TP = entry - (SL distance * tp_rr)  for shorts
# 1.0 = 1:1 RR (win rate must be > 50% to be profitable)
# 1.5 = 1:1.5 RR (win rate must be > 40% to be profitable)
# 2.0 = 1:2 RR  (win rate must be > 33% to be profitable) (recommended)
# 3.0 = 1:3 RR  (win rate must be > 25% to be profitable)
tp_rr       = 2

# pip_size: price distance per pip for display purposes
# 1.0 is correct for all crypto USDT pairs
pip_size    = 1.0

# -----------------------------------------------------------------------------
[SCANNER]

# interval_seconds is derived AUTOMATICALLY from [BINANCE] timeframe
# No need to set it manually. Reference:
#   1m=60s   3m=180s   5m=300s   15m=900s   30m=1800s
#   1h=3600s  4h=14400s  1d=86400s  1w=604800s

# Maximum simultaneous Binance API requests (pair data fetching)
# Reduce to 20-30 if you see frequent timeout errors
max_concurrent_requests = 50

# Number of CPU threads for signal scanning (one per pair in parallel)
# Set to number of CPU cores on your machine for best performance
# Recommended: 8-16
max_worker_threads      = 16
