min_series = 2

#
[LIQUIDITY_SWING]
enabled   = true
pivot_len = 14
area      = WICK_EXTREMITY

#
[ZONE]
overlap_tol = 0.1

#
[REJECTION]
enabled      = true
ratio        = 1.5
min_body_atr = 0.05
zone_mode    = WICK_IN_CLOSE_OUT
require_confluence = true
# NOTE: automatically capped to number of ENABLED zone types.
# e.g. if ODD_CANDLE disabled, min=3 is treated as 2.
min_confluence = 3

#
[HTF_FILTER]
# ── Master switch ────────────────────────────────────────────────────────────
# true  = HTF filter active
# false = all signals pass unchanged (HTF ignored entirely)
enabled          = false

# ── Filter mode (when enabled = true) ────────────────────────────────────────
# true  = STRICT: counter-trend signals are SKIPPED
#         (Telegram failure notification sent if notify_failures = true)
# false = LENIENT: counter-trend signals allowed with reduced TP RR
strict           = true

# ── HTF timeframe ─────────────────────────────────────────────────────────────
# Must be HIGHER than your trading timeframe.
#   Trading 5m  -> 1h or 4h     Trading 1h -> 4h or 1d
#   Trading 15m -> 4h or 1d     Trading 4h -> 1d
timeframe        = 1h

# ── Dual EMA (trend structure) ────────────────────────────────────────────────
# Trend = fast EMA direction AND fast > slow (structural bias).
# Bullish: EMA_fast > EMA_slow  |  Bearish: EMA_fast < EMA_slow
# Recommended: 20/50 or 21/55
fast_ema         = 20
slow_ema         = 50

# ── EMA slope filter ─────────────────────────────────────────────────────────
# Trend only valid when EMA is actually moving in that direction.
# A flat EMA = sideways market = neutral (no filter applied).
# This is automatic — no setting needed.

# ── Consecutive candle confirmation ──────────────────────────────────────────
# How many consecutive HTF closes above/below EMA are required
# before a trend is confirmed. Prevents single-candle/wick fakeouts.
# Recommended: 2 (default) to 3 (stricter)
confirm_candles  = 2

# ── ATR buffer zone (anti-whipsaw) ────────────────────────────────────────────
# Price must be beyond EMA +/- (ATR * buffer_mult) to count as above/below.
# Ignores tiny EMA crosses where price hovers around EMA.
# Recommended: 0.1 (10% of ATR) — increase to 0.2 for choppier markets
atr_buffer_mult  = 0.1

# ── Trend lock (bot memory) ───────────────────────────────────────────────────
# Once a trend is established, how many consecutive opposite-signal bars
# are required before the trend flips. Prevents flip-flopping on retracements.
# Recommended: 3 (default). Set to 0 to disable locking.
trend_lock_candles = 3

# ── Low-volatility filter ─────────────────────────────────────────────────────
# Minimum ATR as % of price for trend to be valid.
# If ATR/price < this value the market is too flat — trend = neutral.
# 0.002 = 0.2% (default). Increase for very tight markets.
min_atr_pct      = 0.002

# ── Counter-trend TP RR (LENIENT mode only) ───────────────────────────────────
# TP set to this RR multiple for counter-trend trades.
# 0.5 = take profit at 0.5x the SL distance (tight, quick exit).
counter_trend_rr = 0.3

#
[TRADE]
sl_atr_mult = 1.5
sl_atr_len  = 14
tp_rr       = 2
pip_size    = 1.0

#
[POSITION_SIZING]
enabled   = true
risk      = 1.0
pip_value = 1.0
min_lot   = 0.001
lot_step  = 0.001

#
[SCANNER]
# interval_seconds derived automatically from timeframe:
#   1m=60  3m=180  5m=300  15m=900  30m=1800  1h=3600  4h=14400  1d=86400
max_concurrent_requests = 50
max_worker_threads      = 16
